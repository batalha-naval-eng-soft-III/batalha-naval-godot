name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  GODOT_VERSION: 4.6.2
  EXPORT_NAME: batalha-naval
  PROJECT_PATH: .

jobs:
  export-web:
    name: Web Export
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:4.6.2

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install web bridge dependencies
        run: bun install --frozen-lockfile
        working-directory: WebBridge

      - name: Setup Godot export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable \
             ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable

      - name: Build Godot for Web
        run: |
          mkdir -p "$PROJECT_PATH/web-build"

          godot --headless \
            --path "$PROJECT_PATH" \
            --export-release "Web" \
            "$PROJECT_PATH/web-build/index.html"

      - name: Build TypeScript bridge
        run: bun run build
        working-directory: WebBridge

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: web
          path: web-build
